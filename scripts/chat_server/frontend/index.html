<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>CCC Hub（运维）</title>
<link rel="stylesheet" href="/css/variables.css?v=20260718dual1">
<link rel="stylesheet" href="/css/base.css?v=20260718dual1">
<link rel="stylesheet" href="/css/themes.css?v=20260718dual1">
<link rel="stylesheet" href="/css/components.css?v=20260718dual1">
<link rel="stylesheet" href="/css/shell.css?v=20260718dual1">
<link rel="stylesheet" href="/css/dual-pane.css?v=20260718dual1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<script>
(function() {
  var saved = localStorage.getItem('ccc-theme') || localStorage.getItem('opencode-color-scheme');
  var theme = saved === 'light' || saved === 'dark' ? saved
    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
</head>
<body class="hub-mode">
<nav id="hub-nav" aria-label="CCC Hub">
  <div class="hub-brand" title="网页为运维入口；主产品见 CCC Desktop">CCC<em>Hub</em> <span style="font-size:10px;opacity:.55;font-weight:500">运维</span></div>
  <a class="hub-nav-link" data-route="board" href="#/board">看板</a>
  <a class="hub-nav-link" data-route="console" href="#/console">控制台</a>
  <a class="hub-nav-link" data-route="ops" href="#/ops">运维</a>
  <div class="hub-nav-spacer"></div>
</nav>
<div id="hub-views">
  <div class="hub-view" id="view-board"></div>
  <div class="hub-view" id="view-console"></div>
  <div class="hub-view" id="view-ops"></div>
</div>
<div class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
<select id="project-select" style="display:none;"></select>

<script>
function toggleMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.querySelector('.sidebar-overlay');
  if (!sidebar) return;
  sidebar.classList.toggle('open');
  if (overlay) overlay.classList.toggle('show');
  /* Hub 壳始终锁死 body 滚动（iOS 勿放开，否则整页可滑） */
  document.body.style.overflow = 'hidden';
}

function copyCode(btn) {
  const pre = btn.closest('.code-block-wrap')?.querySelector('pre');
  const code = pre ? (pre.textContent || pre.innerText) : '';
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.textContent;
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => {
    btn.textContent = '复制失败';
  });
}

document.addEventListener('DOMContentLoaded', function() {
  const fab = document.getElementById('scroll-fab');
  const messages = document.getElementById('messages');
  if (fab && messages) {
    messages.addEventListener('scroll', function() {
      const atBottom = messages.scrollTop + messages.clientHeight >= messages.scrollHeight - 200;
      fab.classList.toggle('show', !atBottom);
    });
    fab.addEventListener('click', function() {
      messages.scrollTop = messages.scrollHeight;
      fab.classList.remove('show');
    });
  }
});
</script>
<script type="module" src="/js/app.js?v=20260718dual1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>CCC</title>
<link rel="stylesheet" href="/css/variables.css?v=20260724boardws1">
<link rel="stylesheet" href="/css/base.css?v=20260724boardws1">
<link rel="stylesheet" href="/css/themes.css?v=20260724boardws1">
<link rel="stylesheet" href="/css/components.css?v=20260724boardws1">
<link rel="stylesheet" href="/css/shell.css?v=20260724boardws1">
<link rel="stylesheet" href="/css/dual-pane.css?v=20260724boardws1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<script src="/js/theme-init.js?v=20260724boardws1"></script>
<script>
(function () {
  var port = String(location.port || '');
  var dialogue = port === '7788' || window.__CCC_SHELL__ === 'dialogue';
  if (dialogue) {
    window.__CCC_SHELL__ = 'dialogue';
    document.documentElement.setAttribute('data-shell', 'dialogue');
  } else {
    document.documentElement.setAttribute('data-shell', 'hub');
  }
})();
</script>
</head>
<body class="hub-mode">
<nav id="hub-nav" aria-label="CCC Hub">
  <div class="hub-brand" title="编排口；对话在 M1 :7788">CCC<em>Hub</em></div>
  <a class="hub-nav-link" data-route="board" href="#/board">看板</a>
  <a class="hub-nav-link" data-route="ops" href="#/ops">运维</a>
  <a class="hub-nav-link" data-route="console" href="#/console">控制台</a>
  <a class="hub-nav-link" data-route="chat" href="#/chat">对话</a>
  <div class="hub-nav-spacer"></div>
</nav>
<div id="hub-views">
  <div class="hub-view" id="view-chat">
<div id="app">
  <div class="hub-remote-banner hub-shell-only" role="status">
    编排口：看板 / 运维。聊天请开对话口（M1 :7788）。
  </div>

  <div id="titlebar">
    <div id="tabs" style="display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto;overflow-y:hidden;"></div>
    <div id="streaming-indicator">
      <span class="dot"></span>
      <span>生成中...</span>
    </div>
    <div class="titlebar-spacer"></div>
    <button class="titlebar-btn" id="sidebar-toggle" title="侧栏" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="titlebar-btn" id="task-btn" title="下达任务">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M12 11v6M9 14h6"/></svg>
    </button>
    <button class="titlebar-btn" id="board-btn" title="看板摘要">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/></svg>
    </button>
    <button class="titlebar-btn hub-shell-only" id="dual-pane-btn" title="分屏（已废弃·仅调试）" hidden>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg>
    </button>
    <button class="titlebar-btn" id="new-tab-btn" title="新对话">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="titlebar-btn" id="settings-btn" title="设置">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="titlebar-btn" id="theme-btn" title="切换主题">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
  <div id="layout">
    <div id="sidebar">
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="目的地">
        <button type="button" class="soft-row soft-row-prominent" id="sidebar-reset-btn" title="清空当前项目本机会话">
          <span class="soft-row-icon soft-icon-reset" aria-hidden="true"></span>
          <span class="soft-row-label">重置对话</span>
        </button>
        <button type="button" class="soft-row" data-dest="chat" title="对话">
          <span class="soft-row-icon soft-icon-chat" aria-hidden="true"></span>
          <span class="soft-row-label">对话</span>
        </button>
        <button type="button" class="soft-row" data-dest="board" title="看板">
          <span class="soft-row-icon soft-icon-board" aria-hidden="true"></span>
          <span class="soft-row-label">看板</span>
        </button>
        <button type="button" class="soft-row" data-dest="ops" title="运维">
          <span class="soft-row-icon soft-icon-ops" aria-hidden="true"></span>
          <span class="soft-row-label">运维</span>
        </button>
      </nav>
      <div class="sidebar-divider" aria-hidden="true"></div>
      <div class="sidebar-projects" id="sidebar-projects" role="list" aria-label="项目">
        <div class="skeleton" style="height:40px;margin:8px;"></div>
      </div>
      <div class="sidebar-divider" aria-hidden="true"></div>
      <div class="sidebar-search-block">
        <div class="sidebar-search-wrap">
          <span class="sidebar-search-icon" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input class="sidebar-search" id="sidebar-search" type="text" placeholder="搜索消息…" autocomplete="off" aria-label="搜索消息">
          <button class="sidebar-search-clear" id="sidebar-search-clear" type="button" aria-label="清除">×</button>
        </div>
        <div class="sidebar-search-results" id="sidebar-search-results" hidden></div>
      </div>
      <div class="sidebar-divider" aria-hidden="true"></div>
      <div class="sidebar-footer" id="sidebar-footer">
        <button type="button" class="soft-row" id="sidebar-help-btn" title="用法">
          <span class="soft-row-icon soft-icon-help" aria-hidden="true"></span>
          <span class="soft-row-label">用法</span>
        </button>
        <button type="button" class="soft-row" id="sidebar-settings-btn" title="设置">
          <span class="soft-row-icon soft-icon-gear" aria-hidden="true"></span>
          <span class="soft-row-label">设置</span>
        </button>
      </div>
    </div>
    <div id="chat-panel">
      <div id="messages"></div>
      <button class="scroll-fab" id="scroll-fab">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        底部
      </button>
      <div id="composer">
        <div class="composer-actions-bar" id="qa-dock-host" aria-label="快速动作"></div>
        <div id="composer-inner">
          <div id="attachment-chips" class="attachment-chips" hidden></div>
          <div class="composer-input-wrap">
            <button class="composer-btn attach-btn" id="attach-btn" title="附件" type="button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea id="composer-input" rows="1" placeholder="发送消息…" autofocus></textarea>
            <button class="composer-btn" id="cancel-btn" title="取消" type="button">✕</button>
            <button class="composer-btn send-btn" id="send-btn" title="发送" disabled type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <div class="composer-toolbar">
            <div class="composer-controls">
              <div class="composer-model-wrap" title="讨论=只读 · 工程师=可写本机仓 + 板务">
                <span class="composer-model-label">模式</span>
                <select class="model-select" id="tool-mode-select">
                  <option value="discuss">讨论</option>
                  <option value="engineer" selected>工程师</option>
                </select>
              </div>
              <div class="composer-model-wrap" title="选择模型">
                <span class="composer-model-label">模型</span>
                <select class="model-select" id="model-select">
                  <option value="flash">flash</option>
                  <option value="code">code</option>
                  <option value="sonnet">sonnet</option>
                  <option value="haiku">haiku</option>
                </select>
              </div>
            </div>
            <div class="composer-meta">
              <span class="context-indicator" title="当前项目">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                <span id="project-display">CCC</span>
              </span>
            </div>
          </div>
          <input type="file" id="file-input" multiple accept="image/*,.txt,.md,.csv,.json,.py,.js,.ts,.html,.css" hidden>
        </div>
      </div>
    </div>
  </div>
</div>
  </div>
  <div class="hub-view" id="view-board"></div>
  <div class="hub-view" id="view-console"></div>
  <div class="hub-view" id="view-ops"></div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<select id="project-select" style="display:none;"></select>

<script src="/js/shell-ui.js?v=20260724boardws1"></script>
<script type="module" src="/js/app.js?v=20260724boardws1"></script>
</body>
</html>

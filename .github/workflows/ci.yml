# CCC CI — GitHub Actions
# Jobs: version-sync, pytest, ruff, shellcheck, precommit, e2e, selfcheck, scripts-tests
# Triggers: push, PR
# NOTE: CCC is a SKILL not a Python project — most jobs run on `push` only,
# PRs are documented but optional (because main branch is the source of truth).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-sync:
    name: version-sync (VERSION consistency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run check-version-sync
        run: python scripts/check-version-sync.py

  pytest:
    name: pytest (scripts)
    runs-on: macos-latest  # Bash scripts need macOS for `stat -f`
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx requests
      - name: Run smoke tests
        run: |
          echo "=== Smoke: scripts/*.py syntax ==="
          for f in scripts/*.py; do python -m py_compile "$f" || exit 1; done
          echo "=== Smoke: scripts/*.sh syntax ==="
          for f in scripts/*.sh tools/*.sh; do bash -n "$f" || exit 1; done
          echo "=== pytest tests/scripts ==="
          pytest tests/scripts/ -v --tb=short

  ruff:
    name: ruff (Python lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          version: "0.8.6"
          args: "check scripts/ tests/ examples/"

  shellcheck:
    name: shellcheck (bash lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck scripts/*.sh tools/*.sh

  precommit:
    name: pre-commit hooks (if installed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: |
          if [ -f .pre-commit-config.yaml ]; then
            pre-commit run --all-files
          else
            echo "no .pre-commit-config.yaml — skip"
          fi

  e2e:
    name: e2e (pipeline smoke + green + f1)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx requests
      - name: Pipeline smoke
        run: bash tests/e2e/test_pipeline_smoke.sh
      - name: Green pipeline e2e
        run: bash tests/e2e/test_green_pipeline_e2e.sh
      - name: F1 backlog failover
        run: bash tests/e2e/test_f1_backlog_failover.sh

  selfcheck:
    name: self-check (syntax + security scan)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx requests
      - name: Run self-check
        run: bash scripts/ccc-self-check.sh

  scripts-tests:
    name: scripts/tests (hub_voice + transfer_gate)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx requests
      - name: Run scripts/tests
        run: pytest scripts/tests/ -v --tb=short

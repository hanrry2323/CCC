# examples/cluster/m1.yaml
# Node config template for M1 (Apple Mac M1, the development primary).
# v1.0 PoC reference — adapt for actual deployment.
#
# Use:   ccc-dispatch.py references this for capability assertions
#        cluster-bus.py loads via POST /api/node/register (programmatic load)
# Verify: yamllint --strict m1.yaml
node:
  id: m1                            # unique, used in heartbeat & dispatch
  host: 127.0.0.1                   # bind address (loopback in PoC)
  port: 9100                        # cluster-bus listener

  # Capability tags — L1 basic / L2 LLM / L3 specialized.
  # Empty list OK (defensive); dispatcher marks 0-overlap ineligible.
  capabilities:
    - shell                         # L1: bash, make, system tools
    - python                        # L1: pytest, ruff, python scripts
    - git                           # L1: git bundle stream, hooks
    - claude-p                      # L2: claude -p primary Executor
    - ssh-remote                    # L3: can dispatch to remote clusters

  # Metadata — free-form kv, not used by dispatcher. For human read.
  metadata:
    role: developer                 # developer / verifier / hybrid
    env: dev                        # dev | staging | prod
    machine: "Mac mini M2 Pro"
    os: "macOS 26"
    ssh_user: fan                   # for cross-device sync
    notes: "primary development node"

# examples/cluster/feiniu.yaml
# Node config for feiniu (192.168.3.131, 24h-online Linux box).
# v1.0 PoC reference — adapt for actual deployment.
#
# NOTES:
# - feiniu runs ollama (bge-m3 embeddings for RAG), NOT Claude
# - Cannot run CCC Executor (no Claude CLI). Marks capabilities honestly.
# - dispatcher PoC mode will skip this node for Executor tasks.
# - But feiniu is useful for EMBEDDING / RAG tasks (planned future).
node:
  id: feiniu
  host: 192.168.3.131
  port: 9100

  capabilities:
    - shell                         # L1
    - python                        # L1
    - ollama-bge-m3                 # L2: embedding only, NOT Executor
    - ssh-remote

  metadata:
    role: embedding-worker          # NOT a CCC Executor
    env: prod
    machine: "Linux server"
    os: "Ubuntu 24.04 LTS"
    ssh_user: feiniu
    notes: "ollama bge-m3 serving 11434. Cannot dispatch claude -p here."
